# Reverse-proxy per host: instrada /<dominio>/ al container <dominio>:8080
# sulla rete docker interna 'mediamgr' (risoluzione nomi a runtime via DNS Docker).
server {
    listen 80;
    server_name _;
    client_max_body_size 300M;
    resolver 127.0.0.11 valid=10s;   # DNS interno di Docker

    location /media/ {
        set $up_media media:8080;
        # $request_uri mantiene il prefisso /media (coerente con base_path=/media)
        proxy_pass http://$up_media$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    location = / {
        default_type text/plain;
        return 200 "media-manager reverse-proxy. domini: media \n";
    }
    location / { return 404; }
}
