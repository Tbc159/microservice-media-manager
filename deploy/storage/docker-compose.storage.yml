# Object storage condiviso (coll/prod): MinIO, S3-compatible, self-hosted, zero licenza.
# Infrastruttura condivisa come il reverse-proxy: vive su deploy/, sulla rete 'mediamgr',
# riusabile da qualunque dominio. NON va in dev/staging (la' STORAGE_BACKEND=local).
#
# Interfacce:
#   :9000  S3 API   -> SOLO rete interna 'mediamgr' (i container vi accedono via DNS 'minio')
#   :9001  Console  -> pubblicata sull'host per l'ops team (browse, policy, metriche)
#
# Init bucket: il servizio one-shot 'minio-init' (idempotente) crea il bucket ad ogni deploy.
services:
  minio:
    image: minio/minio:RELEASE.2024-06-29T01-32-17Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER mancante}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD mancante}
    volumes:
      - ${MINIO_DATA_PATH:-./data/minio}:/data
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # Console UI per ops team
    expose:
      - "9000"                                # S3 API: solo rete interna mediamgr
    networks:
      - mediamgr
    restart: unless-stopped
    healthcheck:
      # Endpoint di liveness interno di MinIO (nessun tool esterno richiesto).
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # One-shot idempotente: crea il bucket e ne imposta la policy. Esce a init completato.
  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "/init/init-minio.sh"]
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER mancante}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD mancante}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-media-source}
    volumes:
      - ./init-minio.sh:/init/init-minio.sh:ro
    networks:
      - mediamgr
    restart: "no"

networks:
  mediamgr:
    external: true
