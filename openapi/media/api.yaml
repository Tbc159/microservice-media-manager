openapi: 3.0.3
info:
  title: Media API
  version: 0.1.0
  description: |
    API del dominio "media": gestione dei file media auto-scaricati.
    base_path /v0 e' applicato da src/app.py; i path qui sotto sono relativi
    a quel prefisso. URL effettivi: /v0/media, /v0/media/health.
servers:
  - url: /v0
    description: Development server (base path applicato da connexion)
paths:
  /media/health:
    get:
      operationId: get_health
      tags: [media]
      summary: Health check del dominio media
      responses:
        '200':
          description: Servizio attivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
              example:
                status: ok
  /media:
    get:
      operationId: list_media
      tags: [media]
      summary: Lista tutti i file media
      description: Recupera la lista di tutti i file media auto-scaricati.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Operazione eseguita con successo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MediaItem'
              example:
                - id: 2
                  name: "data_NomeFile.m4a"
                  creation_date_s: 1779873651
                  download_link: "http://host/download/data_NomeFile.m4a"
                  status: "draft"
                  pubblicazione:
                    titolo: null
                    description: null
                    cover_image: null
                    publishing_date_s: null
                - id: 1
                  name: "data_AltroFile.m4a"
                  creation_date_s: 1779873600
                  download_link: "http://host/download/data_AltroFile.m4a"
                  status: "published"
                  pubblicazione:
                    titolo: "Titolo puntata"
                    description: "Descrizione puntata"
                    cover_image: "http://host/covers/data_AltroFile.jpg"
                    publishing_date_s: 1879873651
                - id: 0
                  name: "data_PrimoFile.m4a"
                  creation_date_s: 1779873500
                  download_link: "http://host/download/data_PrimoFile.m4a"
                  status: "processing"
                  pubblicazione:
                    titolo: null
                    description: null
                    cover_image: null
                    publishing_date_s: null
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
    MediaItem:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          example: "data_NomeFile.m4a"
        creation_date_s:
          type: integer
          description: Timestamp Unix in secondi.
          example: 1779873651
        download_link:
          type: string
          format: uri
          example: "http://host/download/data_NomeFile.m4a"
        status:
          type: string
          enum: [draft, processing, published]
        pubblicazione:
          type: object
          nullable: true
          properties:
            titolo:
              type: string
              nullable: true
              description: Titolo della puntata.
            description:
              type: string
              nullable: true
              description: Descrizione della puntata.
            cover_image:
              type: string
              nullable: true
              description: URL immagine, stato autogenerazione o upload.
            publishing_date_s:
              type: integer
              nullable: true
              description: Timestamp Unix di pubblicazione in secondi.
              example: 1879873651
