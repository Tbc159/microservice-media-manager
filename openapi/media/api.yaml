openapi: 3.0.3
info:
  title: Media API
  version: 1.0.0
  description: |
    API del dominio "media": gestione dei file media auto-scaricati.
    Il prefisso di dominio (/media) NON e' scritto qui: viene applicato come
    base_path al wiring (src/app.py) e instradato dal reverse-proxy. Le path
    qui sotto sono relative al dominio.
servers:
  - url: /media
paths:
  /health:
    get:
      operationId: get_health
      summary: Health check del dominio media
      responses:
        '200':
          description: Servizio attivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
              example:
                status: ok
  /items:
    get:
      operationId: list_media
      summary: List all media
      description: Recupera la lista di tutti i file media auto-scaricati.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Operazione eseguita con successo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MediaItem'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
    MediaItem:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          example: "data_NomeFile.m4a"
        creation_date_s:
          type: integer
          description: Timestamp in secondi.
          example: 1779873651
        download_link:
          type: string
          format: uri
          example: "http://host/download/data_NomeFile.m4a"
        status:
          type: string
          enum: [draft, processing, published]
        pubblicazione:
          type: object
          properties:
            titolo:
              type: string
              nullable: true
              description: Titolo della puntata.
            description:
              type: string
              nullable: true
              description: Descrizione della puntata.
            cover_image:
              type: string
              nullable: true
              description: Puo' contenere l'URL, uno stato di autogenerazione o upload.
