# Unita' deployabile del dominio "media".
# Modello replicato per ogni futuro dominio (docker-compose.social.yml, ...).
# Ingresso solo via reverse-proxy (deploy/proxy): il container espone 8080 sulla rete
# 'mediamgr' col nome di servizio = dominio, niente porte host pubblicate qui.
# Deploy selettivo: la CI rideploya SOLO questo compose quando cambia il dominio media.
services:
  media:
    build:
      context: .
      args:
        DOMAIN: media
    image: media-manager-media:latest
    container_name: media
    environment:
      DOMAIN: media
      PORT: 8080
      # Iniettati dai secret dell'environment GitHub in fase di deploy (opzionali in locale)
      API_HOST: ${API_HOST:-}
      API_KEY: ${API_KEY:-}
      API_SECRET: ${API_SECRET:-}
    env_file:
      - config/media/${APP_ENV:-staging}.env
    expose:
      - "8080"
    networks:
      - mediamgr
    restart: unless-stopped

networks:
  mediamgr:
    external: true
