# Unita' deployabile del dominio "media".
# Reverse-proxy: location /media/ -> proxy_pass http://10.1.3.10:3000 (porta host 3000).
# Deploy selettivo: la CI rideploya SOLO questo compose quando cambia il dominio media.
services:
  media:
    build:
      context: .
      args:
        DOMAIN: media
    image: media-manager-media:latest
    container_name: media-manager-media
    environment:
      DOMAIN: media
      PORT: 8080
    env_file:
      - config/media/${APP_ENV:-staging}.env
    ports:
      - "3000:8080"
    restart: unless-stopped
