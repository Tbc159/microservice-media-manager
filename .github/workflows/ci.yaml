name: CI - Contract Consistency

on:
  pull_request:
    branches: [main, coll, develop]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Cache openapi-generator jar
        uses: actions/cache@v4
        with:
          path: .cache
          key: openapi-gen-${{ hashFiles('Makefile') }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements*.txt') }}

      - name: Install
        run: make install

      - name: Validate OAS (strict)
        run: make validate

      - name: Generate all (fresh)
        run: make generate-all

      - name: Check api-collections in sync
        run: make collections-check

      # In modalita' "commit del generato" decommenta per imporre la coerenza:
      # - name: Check generated up-to-date
      #   run: |
      #     if [ -n "$(git status --porcelain generated/)" ]; then
      #       echo "::error::Esegui 'make generate-all' e committa generated/."; exit 1
      #     fi

      - name: Lint
        run: make lint

      - name: Test
        run: make test
