name: Generate & Deploy API

on:
  push:
    branches: [develop, coll, main]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # Rileva quali domini sono cambiati nel push -> matrix di deploy selettivo.
  detect:
    runs-on: ubuntu-latest
    outputs:
      domains: ${{ steps.set.outputs.domains }}
      gh_environment: ${{ steps.map.outputs.gh_environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: map
        name: Mappa branch -> GitHub Environment
        run: |
          case "${{ github.ref_name }}" in
            develop) ENV="staging" ;;
            coll)    ENV="collaudo" ;;
            main)    ENV="production" ;;
            *)       echo "::error::Branch non mappato: ${{ github.ref_name }}"; exit 1 ;;
          esac
          echo "gh_environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "::notice::Deploy target -> $ENV"

      - id: set
        name: Calcola i domini impattati
        # shell senza -e/pipefail: un grep senza match (exit 1) non deve abortire la detection
        shell: bash --noprofile --norc {0}
        run: |
          ALL=$(for d in openapi/*/; do [ -f "$d/api.yaml" ] && basename "$d"; done | sort -u)
          BEFORE="${{ github.event.before }}"

          # Primo push / forced / parent non più raggiungibile -> rideploya tutto
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            FILES=$(git ls-tree -r --name-only HEAD)
          else
            FILES=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          fi

          # File condivisi -> impattano ogni build -> tutti i domini
          if echo "$FILES" | grep -Eq '^(Makefile|Dockerfile|\.dockerignore|requirements.*\.txt|src/app\.py|src/client/|openapi/config/|openapi/shared/)'; then
            CHANGED="$ALL"
          else
            CAND=$(echo "$FILES" | sed -nE 's#^openapi/([^/]+)/.*#\1#p; s#^config/([^/]+)/.*#\1#p; s#^src/domains/([^/]+)/.*#\1#p; s#^docker-compose\.([^.]+)\.yml$#\1#p' | sort -u)
            CHANGED=$(comm -12 <(echo "$ALL") <(echo "$CAND"))   # solo domini esistenti
          fi
          CHANGED=$(echo "$CHANGED" | grep -v '^$')

          if [ -z "$CHANGED" ]; then
            echo "::notice::Nessun dominio impattato: niente deploy."
            echo 'domains=[]' >> "$GITHUB_OUTPUT"
          else
            JSON=$(echo "$CHANGED" | jq -R . | jq -cs .)
            echo "domains=$JSON" >> "$GITHUB_OUTPUT"
            echo "::notice::Domini da deployare: $CHANGED"
          fi

  # Gate contract+test su runner cloud, PRIMA di toccare gli host (che non eseguono
  # il toolchain java/python: solo docker).
  verify:
    needs: detect
    if: needs.detect.outputs.domains != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        domain: ${{ fromJson(needs.detect.outputs.domains) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Cache openapi-generator jar
        uses: actions/cache@v4
        with:
          path: .cache
          key: openapi-gen-${{ hashFiles('Makefile') }}
      - name: Validate + generate + test (dominio ${{ matrix.domain }})
        run: |
          make install
          make generate-${{ matrix.domain }}
          make test

  # Deploy sull'host dell'ambiente via self-hosted runner (label = nome environment).
  # Build sull'host (no registry). Idempotente: rete + proxy + container del dominio.
  deploy:
    needs: [detect, verify]
    if: needs.detect.outputs.domains != '[]'
    runs-on: [self-hosted, "${{ needs.detect.outputs.gh_environment }}"]
    strategy:
      fail-fast: false
      max-parallel: 1          # un dominio per volta sull'host (proxy/rete condivisi)
      matrix:
        domain: ${{ fromJson(needs.detect.outputs.domains) }}
    environment:
      name: ${{ needs.detect.outputs.gh_environment }}   # gate reviewers su production
    env:
      APP_ENV: ${{ needs.detect.outputs.gh_environment }}
      PROXY_HTTP_PORT: ${{ vars.PROXY_HTTP_PORT || '80' }}
      API_HOST: ${{ secrets.API_HOST }}
      API_KEY: ${{ secrets.API_KEY }}
      API_SECRET: ${{ secrets.API_SECRET }}
      # Object storage (coll/prod). In staging non usato: STORAGE_BACKEND=local.
      STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
      STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
      STORAGE_BUCKET: ${{ vars.STORAGE_BUCKET || 'media-source' }}
      SOURCE_DATA_PATH: ${{ vars.SOURCE_DATA_PATH || '/opt/mediamgr/source' }}
      MINIO_DATA_PATH: ${{ vars.MINIO_DATA_PATH || '/opt/mediamgr/minio' }}
    steps:
      - uses: actions/checkout@v4

      - name: Assicura rete + reverse-proxy (idempotente)
        run: |
          docker network create mediamgr 2>/dev/null || true
          bash deploy/proxy/gen-nginx-conf.sh
          # --force-recreate: nginx.conf e' bind-mount di un singolo file; actions/checkout
          # lo riscrive con un nuovo inode a ogni deploy, ma un container gia' attivo resta
          # agganciato al vecchio inode (reload/restart NON bastano). Ricreare il container
          # rimonta l'inode corrente, garantendo che le rotte dei domini nuovi siano caricate.
          docker compose -f deploy/proxy/docker-compose.proxy.yml up -d --force-recreate

      - name: Assicura object storage MinIO (coll/prod, idempotente)
        if: env.APP_ENV != 'staging'
        run: |
          docker compose -f deploy/storage/docker-compose.storage.yml up -d
          # Attendi che l'init one-shot (creazione bucket) termini con successo.
          for i in $(seq 1 20); do
            state=$(docker inspect -f '{{.State.Status}}:{{.State.ExitCode}}' minio-init 2>/dev/null || echo "missing")
            case "$state" in
              exited:0) echo "MinIO init OK"; break ;;
              exited:*) echo "::error::minio-init fallito ($state)"; docker logs minio-init || true; exit 1 ;;
              *) echo "attendo minio-init ($state)..."; sleep 3 ;;
            esac
          done

      - name: Deploy dominio ${{ matrix.domain }} (build sull'host)
        run: |
          docker compose -f docker-compose.${{ matrix.domain }}.yml up -d --build

      - name: Smoke / health check
        run: |
          url="http://localhost:${PROXY_HTTP_PORT}/v0/${{ matrix.domain }}/health"
          ok=""
          for i in $(seq 1 10); do
            if curl -fsS "$url"; then echo; echo "OK: $url"; ok=1; break; fi
            echo "tentativo $i fallito, riprovo tra 3s..."; sleep 3
          done
          [ -n "$ok" ] || { echo "::error::health check fallito su $url"; exit 1; }

      - name: Verifica listing source (envelope paginato + SQLite)
        if: matrix.domain == 'source'
        run: |
          url="http://localhost:${PROXY_HTTP_PORT}/v0/source/media?type=audio/m4a"
          body=$(curl -fsS -H "X-API-Key: ${API_KEY}" "$url") || { echo "::error::listing source non raggiungibile"; exit 1; }
          echo "$body"
          echo "$body" | grep -q '"pagination"' || { echo "::error::envelope paginato mancante"; exit 1; }
          echo "OK: listing source valido"
